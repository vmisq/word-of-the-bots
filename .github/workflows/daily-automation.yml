name: Bot Automation

on:
  schedule:
    - cron: '0 8 * * *'  # Morning (8 AM UTC)
    - cron: '0 14 * * *' # Afternoon (2 PM UTC)
    - cron: '0 19 * * *' # Evening (7 PM UTC)
    - cron: '0 23 * * *' # Night (11 PM UTC)
  workflow_dispatch:
    inputs:
      timeOfDay:
        description: 'Time group to notify (morning, afternoon, evening, night). Use "none" to ONLY update the daily message.'
        required: true
        default: 'none'

jobs:
  automation-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Update Message
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_PROJECT_ID: "daily-notifier-2995f"
        run: npm run update-message
      
      - name: Determine Time of Day
        id: time
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "time=${{ github.event.inputs.timeOfDay }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "08" ]; then echo "time=morning" >> $GITHUB_OUTPUT;
            elif [ "$HOUR" == "14" ]; then echo "time=afternoon" >> $GITHUB_OUTPUT;
            elif [ "$HOUR" == "19" ]; then echo "time=evening" >> $GITHUB_OUTPUT;
            elif [ "$HOUR" == "23" ]; then echo "time=night" >> $GITHUB_OUTPUT;
            else echo "time=none" >> $GITHUB_OUTPUT; fi
          fi

      - name: Send Notifications
        if: steps.time.outputs.time != 'none'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: "daily-notifier-2995f"
        run: node send-daily-notifications.js ${{ steps.time.outputs.time }}
