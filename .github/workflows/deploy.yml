name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create config.js
        run: |
          echo "${{ secrets.FIREBASE_CONFIG_JS }}" > config.js
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          # Exclude sensitive files and node_modules
          pattern: |
            !node_modules/
            !service-account.json
            !.github/
            !update-daily-message.js
            !send-daily-notifications.js
            !package.json
            !package-lock.json
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
